# ============================================================
# NAS Web — nginx 反代配置
#
#   1. /api/*          → authd (127.0.0.1:8080)  所有后端 API
#   2. /_next/static/* → Next.js 静态资源（缓存）
#   3. /               → Next.js (127.0.0.1:3000)  页面 SSR
# ============================================================

upstream authd {
    server 127.0.0.1:8080;
}

upstream nextjs {
    server 127.0.0.1:3000;
}

server {
    listen 80;
    server_name _;

    client_max_body_size 2G;

    # authd API 接口（含 /api/files/* 文件操作）
    location /api/ {
        proxy_pass http://authd;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        client_max_body_size 2G; # 上传大文件
    }

    # Next.js 静态资源（长期缓存）
    location /_next/static/ {
        alias /app/.next/static/;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # 公共静态资源
    location /public/ {
        alias /app/public/;
        expires 7d;
    }

    # 其余请求 → Next.js SSR（含 /files 文件管理页面）
    location / {
        proxy_pass http://nextjs;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
